<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QIU | User Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ... (Keeping your existing styles) ... */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        background-color: #2563eb;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .login-container {
        display: flex;
        background: #ffffff;
        border-radius: 40px;
        overflow: hidden;
        width: 100%;
        max-width: 950px;
        height: 600px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }
      .login-left {
        flex: 1;
        background: #2e3e77;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .login-left video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .login-right {
        flex: 1.2;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .logo-section {
        width: 100%;
        text-align: center;
        margin-bottom: 10px;
      }
      .logo-section img {
        width: 180px;
        height: auto;
      }
      h2 {
        font-size: 26px;
        font-weight: 800;
        color: #000;
        margin-bottom: 2px;
      }
      .subtitle {
        font-size: 14px;
        color: #444;
        margin-bottom: 25px;
        text-align: center;
      }
      form {
        width: 100%;
        max-width: 360px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        font-weight: 700;
        font-size: 13px;
        margin-bottom: 6px;
        color: #000;
      }
      input {
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        background-color: #eef4ff;
        font-size: 14px;
        outline: none;
      }
      .btn-primary {
        width: 100%;
        background: #2563eb;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        margin-top: 10px;
      }
      .register-footer {
        margin-top: 20px;
        font-size: 13px;
        color: #000;
      }
      .register-footer a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        align-items: center;
        justify-content: center;
      }
      .modal-content {
        background-color: white;
        padding: 30px;
        border-radius: 20px;
        width: 90%;
        max-width: 400px;
        position: relative;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-left">
        <video autoplay loop muted playsinline>
          <source src="/video/login.mp4" type="video/mp4" />
        </video>
      </div>

      <div class="login-right">
        <div class="logo-section">
          <img src="/image/logo.webp" alt="QIU Logo" />
        </div>

        <h2>User Login</h2>
        <p class="subtitle">Welcome back! Please enter your credentials.</p>

        <form id="userLoginForm">
          <div class="form-group">
            <label>Email Address</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="name@qiu.edu.my"
              required
            />
          </div>

          <div class="form-group">
            <label>Password</label>
            <div style="position: relative">
              <input
                type="password"
                id="loginPass"
                placeholder="••••••••"
                required
              />
              <i
                class="fa-solid fa-eye-slash"
                onclick="togglePassword('loginPass', this)"
                style="
                  position: absolute;
                  right: 15px;
                  top: 50%;
                  transform: translateY(-50%);
                  cursor: pointer;
                  color: #64748b;
                "
              ></i>
            </div>
          </div>

          <div
            style="text-align: right; margin-bottom: 15px; margin-top: -10px"
          >
            <a
              href="javascript:void(0)"
              onclick="openResetModal()"
              style="
                font-size: 12px;
                color: #2563eb;
                text-decoration: none;
                font-weight: 600;
              "
              >Forgot Password?</a
            >
          </div>

          <button type="submit" class="btn-primary">Login to Portal</button>
        </form>

        <div class="register-footer">
          New user? <a href="register.html">Create an account</a>
        </div>
      </div>
    </div>

    <div id="resetModal" class="modal">
      <div class="modal-content">
        <span
          onclick="closeResetModal()"
          style="
            position: absolute;
            right: 20px;
            top: 15px;
            cursor: pointer;
            font-size: 24px;
          "
          >&times;</span
        >
        <h2 style="margin-bottom: 10px">Reset Password</h2>
        <p style="font-size: 14px; margin-bottom: 20px">
          Enter your official email and a new password.
        </p>

        <form id="resetPasswordForm">
          <div class="form-group">
            <label>Official Email</label>
            <input
              type="email"
              id="resetEmail"
              placeholder="name@qiu.edu.my"
              required
            />
          </div>
          <div class="form-group">
            <label>New Password (min 8 chars)</label>
            <input
              type="password"
              id="resetNewPass"
              placeholder="New password"
              minlength="8"
              required
            />
          </div>
          <button type="submit" class="btn-primary">Update Password</button>
        </form>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const resetModal = document.getElementById("resetModal");

        // Modal Functions
        window.openResetModal = () => {
          if (resetModal) resetModal.style.display = "flex";
        };
        window.closeResetModal = () => {
          if (resetModal) resetModal.style.display = "none";
        };

        // Handle Password Reset
        const resetForm = document.getElementById("resetPasswordForm");
        if (resetForm) {
          resetForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById("resetEmail").value.trim();
            const newPassword = document.getElementById("resetNewPass").value;

            if (!email.endsWith("@qiu.edu.my")) {
              alert("Please use a valid @qiu.edu.my email.");
              return;
            }

            try {
              const response = await fetch("/api/forgot-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, newPassword }),
              });
              const data = await response.json();
              if (data.success) {
                alert("Password updated!");
                closeResetModal();
              } else {
                alert(data.error || "Update failed.");
              }
            } catch (err) {
              alert("Server error. Please try again later.");
            }
          };
        }

        // Handle Login
        const loginForm = document.getElementById("userLoginForm");
        if (loginForm) {
          loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPass").value;

            try {
              const response = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password }),
              });
              const data = await response.json();
              if (data.success) {
                window.location.replace("dashboard.html");
              } else {
                alert(data.error || "Invalid credentials.");
              }
            } catch (err) {
              alert("Server connection error.");
            }
          };
        }

        // Toggle Visibility
        window.togglePassword = (inputId, icon) => {
          const input = document.getElementById(inputId);
          if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye-slash", "fa-eye");
          } else {
            input.type = "password";
            icon.classList.replace("fa-eye", "fa-eye-slash");
          }
        };
      });
    </script>
  </body>
</html>
