<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QIU | User Register</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: #2563eb;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* --- Main Container --- */
      .register-container {
        display: flex;
        background: #ffffff;
        border-radius: 40px;
        overflow: hidden;
        width: 100%;
        max-width: 950px;
        height: 650px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }

      /* Left Side */
      .register-left {
        flex: 1;
        background: #1e3a8a;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .register-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Right Side - Form */
      .register-right {
        flex: 1.2;
        padding: 30px 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .logo-section {
        width: 100%;
        text-align: center;
        margin-bottom: 5px;
      }

      .logo-section img {
        width: 160px;
        height: auto;
      }

      h2 {
        font-size: 26px;
        font-weight: 800;
        color: #000;
        margin-bottom: 2px;
      }

      .subtitle {
        font-size: 14px;
        color: #444;
        margin-bottom: 20px;
        text-align: center;
      }

      form {
        width: 100%;
        max-width: 360px;
      }

      .form-group {
        margin-bottom: 12px;
      }

      label {
        display: block;
        font-weight: 700;
        font-size: 13px;
        margin-bottom: 6px;
        color: #000;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        background-color: #eef4ff;
        font-size: 14px;
        outline: none;
      }

      input:-webkit-autofill {
        -webkit-box-shadow: 0 0 0 30px #eef4ff inset !important;
      }

      .error-msg {
        display: none;
        color: #ef4444;
        font-size: 11px;
        margin-top: 4px;
        font-weight: 600;
      }

      .btn-primary {
        width: 100%;
        background: #2563eb;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        margin-top: 10px;
      }

      .register-footer {
        margin-top: 15px;
        font-size: 13px;
        color: #000;
      }

      .register-footer a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      /* Modal Overlay */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal-box {
        background: white;
        padding: 40px;
        border-radius: 30px;
        text-align: center;
        max-width: 400px;
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <div class="register-left">
        <img src="/image/signin.jpg" alt="User Portal" />
      </div>

      <div class="register-right">
        <div class="logo-section">
          <img src="/image/logo.webp" alt="QIU Logo" />
        </div>

        <h2>User Register</h2>
        <p class="subtitle">Create your user account to manage reports.</p>

        <form id="userRegisterForm" autocomplete="off">
          <div class="form-group">
            <label>Username</label>
            <input
              type="text"
              id="regUser"
              name="username"
              placeholder="Full Name"
              required
              autocomplete="none"
            />
          </div>

          <div class="form-group">
            <label>QIU Email</label>
            <input
              type="email"
              id="regEmail"
              name="email"
              placeholder="name@qiu.edu.my"
              required
              autocomplete="off"
            />
            <span id="emailError" class="error-msg"
              >Must be a @qiu.edu.my email</span
            >
          </div>

          <div class="form-group">
            <label>Password</label>
            <div style="position: relative">
              <input
                type="password"
                id="regPass"
                placeholder="••••••••"
                minlength="8"
                required
              />
              <i
                class="fa-solid fa-eye-slash toggle-password"
                onclick="togglePassword('regPass', this)"
                style="
                  position: absolute;
                  right: 15px;
                  top: 50%;
                  transform: translateY(-50%);
                  cursor: pointer;
                  color: #64748b;
                "
              ></i>
            </div>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <div style="position: relative">
              <input
                type="password"
                id="regConfirm"
                placeholder="••••••••"
                minlength="8"
                required
              />
              <i
                class="fa-solid fa-eye-slash toggle-password"
                onclick="togglePassword('regConfirm', this)"
                style="
                  position: absolute;
                  right: 15px;
                  top: 50%;
                  transform: translateY(-50%);
                  cursor: pointer;
                  color: #64748b;
                "
              ></i>
            </div>
            <span id="passError" class="error-msg">
              Passwords must match and contain only letters and numbers (max 8).
            </span>
          </div>

          <button type="submit" class="btn-primary">Register Account</button>
        </form>

        <div class="register-footer">
          Already have an account? <a href="login.html">Login here</a>
        </div>
      </div>
    </div>

    <div id="regSuccessModal" class="modal-overlay">
      <div class="modal-box">
        <div style="font-size: 50px">🎉</div>
        <h2>Success!</h2>
        <p style="margin: 15px 0; color: #64748b">
          Your account has been created successfully.
        </p>
        <button
          onclick="window.location.href = 'login.html'"
          class="btn-primary"
        >
          Go to Login
        </button>
      </div>
    </div>

    <script>
      function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        } else {
          input.type = "password";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        }
      }

      document.getElementById("userRegisterForm").onsubmit = async (e) => {
        e.preventDefault();

        const username = document.getElementById("regUser").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPass").value;
        const confirm = document.getElementById("regConfirm").value;
        const passError = document.getElementById("passError");
        const emailError = document.getElementById("emailError");

        // Email Domain Validation
        if (!email.endsWith("@qiu.edu.my")) {
          emailError.style.display = "block";
          return;
        } else {
          emailError.style.display = "none";
        }

        // NEW: Strength Validation
        const strengthRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

        if (!strengthRegex.test(password)) {
          passError.innerText =
            "Error: Use at least 8 characters with letters and numbers.";
          passError.style.display = "block";
          return;
        }

        if (password !== confirm) {
          passError.innerText = "Error: Passwords do not match!";
          passError.style.display = "block";
          return;
        }

        passError.style.display = "none";

        try {
          const response = await fetch("/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, email, password }),
          });

          const result = await response.json();

          if (result.success) {
            document.getElementById("regSuccessModal").style.display = "flex";
          } else {
            alert(result.error || "Registration failed.");
          }
        } catch (err) {
          alert("Could not connect to the server.");
        }
      };
    </script>
  </body>
</html>
